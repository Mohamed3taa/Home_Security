<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Camera Viewer</title>
    
    <link rel="icon" type="image/png" href="logo.png">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <script src="https://unpkg.com/fernet@0.4.0/fernetBrowser.js"></script>

    <style>
        /* ─── Variables & Theme ─── */
        :root {
            /* Light Theme Defaults (HSL) */
            --hue: 215;
            --bg-body:       hsl(var(--hue), 20%, 96%);
            --bg-card:       hsl(0, 0%, 100%);
            --bg-input:      hsl(var(--hue), 20%, 98%);
            --border:        hsl(var(--hue), 15%, 88%);
            --border-focus:  hsl(var(--hue), 90%, 60%);
            --text-main:     hsl(var(--hue), 20%, 20%);
            --text-muted:    hsl(var(--hue), 10%, 50%);
            --shadow:        0 10px 30px -10px rgba(0,0,0,0.1);
            
            --accent:        hsl(217, 91%, 60%);
            --accent-hover:  hsl(217, 91%, 50%);
            --danger:        hsl(0, 75%, 55%);
            --success:       hsl(142, 71%, 45%);

            --radius: 12px;
            --app-width: 900px; 
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-body:       hsl(220, 15%, 10%);
                --bg-card:       hsl(220, 15%, 14%);
                --bg-input:      hsl(220, 15%, 18%);
                --border:        hsl(220, 10%, 25%);
                --text-main:     hsl(220, 10%, 90%);
                --text-muted:    hsl(220, 10%, 60%);
                --shadow:        0 10px 40px -10px rgba(0,0,0,0.5);
                
                --accent:        hsl(217, 91%, 65%);
                --accent-hover:  hsl(217, 91%, 70%);
            }
        }

        /* ─── Global Reset ─── */
        * { box-sizing: border-box; outline: none; }
        
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center; 
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* ─── Header & Configuration ─── */
        header {
            padding: 2rem 1rem 1rem;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .config-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2rem;
            width: 100%;
            max-width: var(--app-width);
            box-shadow: var(--shadow);
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        h1 {
            font-size: 1.25rem;
            font-weight: 700;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 12px; /* Increased gap slightly to account for logo */
        }

        /* ADDED: Logo Styling */
        .app-logo {
            height: 32px; /* Fixed height to match text line-height */
            width: auto;
            display: block;
        }

        /* Status Dot */
        .status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: var(--text-muted);
            transition: background-color 0.3s;
        }
        .status-indicator.connected { background-color: var(--success); box-shadow: 0 0 10px var(--success); }
        .status-indicator.error { background-color: var(--danger); }

        /* Form Grid */
        .grid-form {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 1rem;
        }

        /* Input Styling */
        .input-group { display: flex; flex-direction: column; gap: 0.35rem; }
        
        /* Grid Spans */
        .span-8 { grid-column: span 8; } 
        .span-4 { grid-column: span 4; } 
        .span-6 { grid-column: span 6; } 
        .span-12 { grid-column: span 12; } 

        @media (max-width: 600px) {
            .span-8, .span-4, .span-6 { grid-column: span 12; }
        }

        label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
        }

        input {
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px hsla(217, 91%, 60%, 0.15);
        }

        /* Connect Button */
        #btn-connect {
            grid-column: span 12;
            margin-top: 0.5rem;
            padding: 1rem;
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        #btn-connect:hover { background-color: var(--accent-hover); transform: translateY(-1px); }
        #btn-connect:active { transform: translateY(0); }
        
        #btn-connect.connected {
            background-color: var(--bg-input);
            color: var(--danger);
            border: 1px solid var(--danger);
        }
        #btn-connect.connected:hover { background-color: var(--danger); color: white; }

        /* ─── Viewer Stage ─── */
        .stage-area {
            flex: 1;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 1rem 3rem; 
        }

        .video-container {
            width: 100%;
            max-width: var(--app-width);
            aspect-ratio: 16/9; 
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 50px -20px rgba(0,0,0,0.6);
            border: 1px solid var(--border);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #cam-feed {
            width: 100%;
            height: 100%;
            object-fit: contain; 
            display: none;
        }
        #cam-feed.show { display: block; }

        /* Placeholder State */
        .placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            color: #555;
            transition: opacity 0.3s;
        }
        .placeholder svg { width: 64px; height: 64px; opacity: 0.5; }
        .placeholder span { font-size: 0.9rem; font-weight: 500; }
        .hidden { display: none !important; }

        /* Footer Status */
        .status-bar {
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 1rem;
        }

    </style>
</head>
<body>

    <header>
        <div class="config-card" id="config-panel">
            <div class="header-top">
                <h1>
                    <img src="logo.png" alt="App Logo" class="app-logo">
                    
                    <div id="status-dot" class="status-indicator"></div>
                    Secure Stream
                </h1>
                <div style="font-size: 0.8rem; opacity: 0.6">MQTT over WSS</div>
            </div>

            <div class="grid-form">
                <div class="input-group span-8">
                    <label>Broker Host</label>
                    <input type="text" id="broker" value="2e07ebd7885c4dc5ab39efefee0b1e26.s1.eu.hivemq.cloud">
                </div>
                <div class="input-group span-4">
                    <label>Port (WSS)</label>
                    <input type="number" id="port" value="8884">
                </div>
                
                <div class="input-group span-6">
                    <label>Username</label>
                    <input type="text" id="username" value="test_User">
                </div>
                <div class="input-group span-6">
                    <label>Password</label>
                    <input type="password" id="password" value="test_User_Password_1">
                </div>

                <div class="input-group span-12">
                    <label>MQTT Topic</label>
                    <input type="text" id="topic" placeholder="home/security/video/DEVICE_ID">
                </div>

                <div class="input-group span-12">
                    <label>Fernet Key (Base64)</label>
                    <input type="password" id="key" placeholder="Paste encryption key...">
                </div>

                <button id="btn-connect" onclick="toggleConnection()">Connect to Stream</button>
            </div>
        </div>
    </header>

    <main class="stage-area">
        <div class="video-container">
            <img id="cam-feed" alt="Live Feed">
            
            <div class="placeholder" id="placeholder">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M15 10l5-5v14l-5-5"/>
                    <rect x="2" y="6" width="13" height="12" rx="2"/>
                    <path d="M7 12h.01"/>
                </svg>
                <span id="text-status">Waiting for connection...</span>
            </div>
        </div>
        <div class="status-bar" id="log-status">Ready</div>
    </main>

    <script>
        // ────────────────────────────────────────────────
        // Logic
        // ────────────────────────────────────────────────
        let client = null;
        let isConnected = false;
        let secret = null;

        function toggleConnection() {
            if (isConnected) disconnect();
            else connect();
        }

        function connect() {
            const broker   = document.getElementById('broker').value.trim();
            const port     = Number(document.getElementById('port').value);
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const topic    = document.getElementById('topic').value.trim();
            const keyStr   = document.getElementById('key').value.trim();

            if (!broker || !port || !username || !topic || !keyStr) {
                setStatus("Please fill in all fields", true);
                return;
            }

            try {
                secret = new fernet.Secret(keyStr);
            } catch (e) {
                setStatus("Invalid Fernet Key", true);
                return;
            }

            // Create Client
            const clientId = "viewer_" + Math.random().toString(16).slice(2,10);
            client = new Paho.MQTT.Client(broker, port, clientId);

            client.onConnectionLost = onConnectionLost;
            client.onMessageArrived = onMessageArrived;

            const options = {
                useSSL: true,
                userName: username,
                password: password,
                onSuccess: () => {
                    setStatus(`Subscribing to ${topic}...`);
                    client.subscribe(topic);
                    setUIState(true);
                },
                onFailure: (ctx) => {
                    setStatus("Connection Failed: " + ctx.errorMessage, true);
                    setUIState(false);
                }
            };

            setStatus("Connecting to broker...");
            updateBtnState("loading");
            client.connect(options);
        }

        function disconnect() {
            if (client) {
                try { client.disconnect(); } catch(e) {}
                client = null;
            }
            setUIState(false);
            setStatus("Disconnected");
        }

        function onConnectionLost(resp) {
            if (resp.errorCode !== 0) {
                setStatus("Connection lost: " + resp.errorMessage, true);
            }
            setUIState(false);
        }

        function onMessageArrived(msg) {
            try {
                // Decrypt
                const token = new fernet.Token({
                    secret: secret,
                    token: msg.payloadString,
                    ttl: 0
                });
                const decrypted = token.decode();
                
                // Render
                const img = document.getElementById('cam-feed');
                img.src = "data:image/jpeg;base64," + decrypted;
                
                // UI cleanup for first frame
                const placeholder = document.getElementById('placeholder');
                if (!placeholder.classList.contains('hidden')) {
                    placeholder.classList.add('hidden');
                    img.classList.add('show');
                    setStatus("Live Secure Feed");
                }
            } catch (e) {
                console.error("Frame Error", e);
            }
        }

        // ────────────────────────────────────────────────
        // UI Helpers
        // ────────────────────────────────────────────────
        function setUIState(connected) {
            isConnected = connected;
            const btn = document.getElementById('btn-connect');
            const dot = document.getElementById('status-dot');
            const ph  = document.getElementById('placeholder');
            const img = document.getElementById('cam-feed');
            const phText = document.getElementById('text-status');

            if (connected) {
                btn.textContent = "Disconnect";
                btn.classList.add('connected');
                dot.className = "status-indicator connected";
                phText.textContent = "Waiting for stream...";
            } else {
                btn.textContent = "Connect to Stream";
                btn.classList.remove('connected');
                dot.className = "status-indicator"; // reset
                
                // Reset Video View
                img.classList.remove('show');
                ph.classList.remove('hidden');
                phText.textContent = "Stream Offline";
                img.src = "";
            }
        }

        function updateBtnState(state) {
            const btn = document.getElementById('btn-connect');
            if (state === 'loading') {
                btn.textContent = "Connecting...";
                btn.style.opacity = "0.7";
            } else {
                btn.style.opacity = "1";
            }
        }

        function setStatus(msg, isError = false) {
            const el = document.getElementById('log-status');
            const dot = document.getElementById('status-dot');
            el.textContent = msg;
            el.style.color = isError ? "var(--danger)" : "var(--text-muted)";
            
            if(isError) dot.className = "status-indicator error";
        }
    </script>
</body>
</html>
